embeddings:
  provider: "local"
  model_name: "all-MiniLM-L6-v2"

vector_store:
  provider: "chromadb"
  persist_directory: "./data/chroma_db"
  collection_name: "papers_collection"

keyword_store:
  provider: "bm25"
  tokenizer: "standard"

retriever:
  hybrid: true
  vector_weight: 0.6
  keyword_weight: 0.4
  top_k_initial: 10
  
reranker:
  enabled: true
  provider: "cross-encoder"
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_final: 5

chunking:
  chunk_size: 512
  chunk_overlap: 50
